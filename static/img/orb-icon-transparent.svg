<?xml version="1.0" encoding="UTF-8"?>
<!-- S Orbital: Lobe pairs at many angles forming a spherical shell -->
<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <g id="slobe">
            <ellipse cx="50" cy="28" rx="12" ry="20" fill="none" stroke="#000000" stroke-width="1.5" />
            <ellipse cx="50" cy="72" rx="12" ry="20" fill="none" stroke="#000000" stroke-width="1.5" />
        </g>
        <g id="slobeInner">
            <ellipse cx="50" cy="32" rx="7" ry="14" fill="none" stroke="#000000" stroke-width="1" opacity="0.4" />
            <ellipse cx="50" cy="68" rx="7" ry="14" fill="none" stroke="#000000" stroke-width="1" opacity="0.4" />
        </g>
    </defs>
    <!-- Outer shell: 6 pairs at 30° increments = sphere -->
    <use href="#slobe" transform="rotate(0 50 50)" />
    <use href="#slobe" transform="rotate(30 50 50)" />
    <use href="#slobe" transform="rotate(60 50 50)" />
    <use href="#slobe" transform="rotate(90 50 50)" />
    <use href="#slobe" transform="rotate(120 50 50)" />
    <use href="#slobe" transform="rotate(150 50 50)" />
    <!-- Inner shell: 3 pairs for depth -->
    <use href="#slobeInner" transform="rotate(0 50 50)" />
    <use href="#slobeInner" transform="rotate(60 50 50)" />
    <use href="#slobeInner" transform="rotate(120 50 50)" />
    <!-- Center nucleus -->
    <circle cx="50" cy="50" r="3" fill="#000000" />
</svg>
