<?xml version="1.0" encoding="UTF-8"?>
<!-- Orb AVL Icon: language orbital with Entity/Trait/Page trait rings -->
<svg width="64" height="64" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Orbital boundary -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#000000" stroke-width="2" />
  <circle cx="100" cy="100" r="70" fill="#000000" opacity="0.03" />
  <text x="100" y="22" text-anchor="middle" fill="#000000" font-size="11" font-weight="bold">Orb</text>

  <!-- Trait: Entity (rotation -30) -->
  <g opacity="0.6" transform="rotate(-30,100,100)">
    <ellipse cx="100" cy="100" rx="40" ry="18" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 2" />
  </g>
  <!-- Trait: Trait (rotation 30) -->
  <g opacity="0.6" transform="rotate(30,100,100)">
    <ellipse cx="100" cy="100" rx="50" ry="22" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 2" />
  </g>
  <!-- Trait: Page (rotation 90) -->
  <g opacity="0.6" transform="rotate(90,100,100)">
    <ellipse cx="100" cy="100" rx="60" ry="26" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 2" />
  </g>

  <!-- Entity nucleus -->
  <circle cx="100" cy="100" r="16" fill="#000000" opacity="0.15" />
  <circle cx="100" cy="100" r="16" fill="none" stroke="#000000" stroke-width="2.5" />
  <!-- Field lines -->
  <line x1="100" y1="82" x2="100" y2="76" stroke="#000000" stroke-width="1" opacity="0.6" />
  <line x1="116" y1="92" x2="120" y2="88" stroke="#000000" stroke-width="1" opacity="0.6" />
  <line x1="116" y1="108" x2="120" y2="112" stroke="#000000" stroke-width="1" opacity="0.6" />
  <line x1="100" y1="118" x2="100" y2="124" stroke="#000000" stroke-width="1" opacity="0.6" />
</svg>
