<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .light-variant { display: block; }
      .dark-variant { display: none; }
      @media (prefers-color-scheme: dark) {
        .light-variant { display: none; }
        .dark-variant { display: block; }
      }
    </style>
  </defs>
  <g class="light-variant">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
    <!-- Root node -->
    <circle cx="400" cy="100" r="28" fill="#f5f5f5" stroke="#000000" stroke-width="3" filter="url(#glow)"/>
    <circle cx="400" cy="100" r="10" fill="#000000"/>
    <!-- Level 1 branches -->
    <line x1="400" y1="128" x2="250" y2="210" stroke="#000000" stroke-width="2"/>
    <line x1="400" y1="128" x2="550" y2="210" stroke="#000000" stroke-width="2"/>
    <!-- Level 1 nodes -->
    <circle cx="250" cy="220" r="22" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <circle cx="250" cy="220" r="8" fill="#000000"/>
    <circle cx="550" cy="220" r="22" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <circle cx="550" cy="220" r="8" fill="#000000"/>
    <!-- Level 2 branches from left -->
    <line x1="250" y1="242" x2="150" y2="330" stroke="#000000" stroke-width="1.5"/>
    <line x1="250" y1="242" x2="300" y2="330" stroke="#000000" stroke-width="1.5"/>
    <!-- Level 2 branches from right -->
    <line x1="550" y1="242" x2="470" y2="330" stroke="#000000" stroke-width="1.5"/>
    <line x1="550" y1="242" x2="620" y2="330" stroke="#000000" stroke-width="1.5"/>
    <!-- Level 2 leaf nodes -->
    <rect x="130" y="335" width="40" height="24" rx="6" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <rect x="280" y="335" width="40" height="24" rx="6" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <rect x="450" y="335" width="40" height="24" rx="6" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <rect x="600" y="335" width="40" height="24" rx="6" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <!-- Level 3 deeper from some leaves -->
    <line x1="150" y1="359" x2="110" y2="430" stroke="#000000" stroke-width="1"/>
    <line x1="150" y1="359" x2="190" y2="430" stroke="#000000" stroke-width="1"/>
    <line x1="620" y1="359" x2="590" y2="430" stroke="#000000" stroke-width="1"/>
    <line x1="620" y1="359" x2="660" y2="430" stroke="#000000" stroke-width="1"/>
    <!-- Level 3 leaf nodes -->
    <circle cx="110" cy="440" r="14" fill="#f5f5f5" stroke="#000000" stroke-width="1.5"/>
    <circle cx="190" cy="440" r="14" fill="#f5f5f5" stroke="#000000" stroke-width="1.5"/>
    <circle cx="590" cy="440" r="14" fill="#f5f5f5" stroke="#000000" stroke-width="1.5"/>
    <circle cx="660" cy="440" r="14" fill="#f5f5f5" stroke="#000000" stroke-width="1.5"/>
    <!-- Parenthesis decorations -->
    <path d="M370 70 Q 360 100, 370 130" fill="none" stroke="#000000" stroke-width="2" opacity="0.3"/>
    <path d="M430 70 Q 440 100, 430 130" fill="none" stroke="#000000" stroke-width="2" opacity="0.3"/>
  
</g>
  <g class="dark-variant">
