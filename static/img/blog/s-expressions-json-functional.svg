    <!-- Parenthesis decorations -->
    <path d="M370 70 Q 360 100, 370 130" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    <path d="M430 70 Q 440 100, 430 130" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  
</g>
</svg>