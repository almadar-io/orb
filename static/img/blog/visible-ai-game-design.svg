<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .light-variant { display: block; }
      .dark-variant { display: none; }
      @media (prefers-color-scheme: dark) {
        .light-variant { display: none; }
        .dark-variant { display: block; }
      }
    </style>
  </defs>
  <g class="light-variant">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
    <!-- Game controller (left) -->
    <g transform="translate(180, 300)">
      <rect x="-80" y="-40" width="160" height="80" rx="30" fill="#f5f5f5" stroke="#000000" stroke-width="3"/>
      <!-- D-pad -->
      <rect x="-50" y="-8" width="30" height="16" rx="2" fill="#000000" opacity="0.5"/>
      <rect x="-42" y="-16" width="14" height="32" rx="2" fill="#000000" opacity="0.5"/>
      <!-- Buttons -->
      <circle cx="40" cy="-10" r="7" fill="#000000" opacity="0.6"/>
      <circle cx="55" cy="0" r="7" fill="#000000" opacity="0.5"/>
      <circle cx="25" cy="0" r="7" fill="#000000" opacity="0.5"/>
      <circle cx="40" cy="10" r="7" fill="#000000" opacity="0.4"/>
    </g>
    <!-- Connection from controller to state machine -->
    <path d="M260 300 C 310 300, 330 280, 370 260" fill="none" stroke="#000000" stroke-width="2.5" stroke-dasharray="8 4"/>
    <polygon points="366,254 376,260 366,266" fill="#000000"/>
    <!-- State machine nodes (right) -->
    <rect x="380" y="150" width="120" height="50" rx="10" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="400" y="168" width="50" height="6" rx="2" fill="#000000" opacity="0.6"/>
    <rect x="380" y="280" width="120" height="50" rx="10" fill="#f5f5f5" stroke="#000000" stroke-width="2.5" filter="url(#glow)"/>
    <rect x="400" y="298" width="60" height="6" rx="2" fill="#000000" opacity="0.6"/>
    <rect x="380" y="410" width="120" height="50" rx="10" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="400" y="428" width="45" height="6" rx="2" fill="#000000" opacity="0.6"/>
    <!-- Transitions -->
    <line x1="440" y1="200" x2="440" y2="275" stroke="#000000" stroke-width="2"/>
    <polygon points="434,271 440,281 446,271" fill="#000000"/>
    <line x1="440" y1="330" x2="440" y2="405" stroke="#000000" stroke-width="2"/>
    <polygon points="434,401 440,411 446,401" fill="#000000"/>
    <!-- Side node (enemy AI) -->
    <rect x="580" y="225" width="130" height="50" rx="10" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <rect x="600" y="243" width="55" height="6" rx="2" fill="#000000" opacity="0.5"/>
    <line x1="500" y1="175" x2="580" y2="240" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <line x1="500" y1="305" x2="580" y2="260" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  
</g>
  <g class="dark-variant">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#111117"/>
    <!-- Game controller (left) -->
    <g transform="translate(180, 300)">
      <rect x="-80" y="-40" width="160" height="80" rx="30" fill="#28282e" stroke="#ffffff" stroke-width="3"/>
      <!-- D-pad -->
      <rect x="-50" y="-8" width="30" height="16" rx="2" fill="#ffffff" opacity="0.5"/>
      <rect x="-42" y="-16" width="14" height="32" rx="2" fill="#ffffff" opacity="0.5"/>
      <!-- Buttons -->
      <circle cx="40" cy="-10" r="7" fill="#ffffff" opacity="0.6"/>
      <circle cx="55" cy="0" r="7" fill="#ffffff" opacity="0.5"/>
      <circle cx="25" cy="0" r="7" fill="#ffffff" opacity="0.5"/>
      <circle cx="40" cy="10" r="7" fill="#ffffff" opacity="0.4"/>
    </g>
    <!-- Connection from controller to state machine -->
    <path d="M260 300 C 310 300, 330 280, 370 260" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="8 4"/>
    <polygon points="366,254 376,260 366,266" fill="#ffffff"/>
    <!-- State machine nodes (right) -->
    <rect x="380" y="150" width="120" height="50" rx="10" fill="#28282e" stroke="#ffffff" stroke-width="2.5"/>
    <rect x="400" y="168" width="50" height="6" rx="2" fill="#ffffff" opacity="0.6"/>
    <rect x="380" y="280" width="120" height="50" rx="10" fill="#28282e" stroke="#ffffff" stroke-width="2.5" filter="url(#glow)"/>
    <rect x="400" y="298" width="60" height="6" rx="2" fill="#ffffff" opacity="0.6"/>
    <rect x="380" y="410" width="120" height="50" rx="10" fill="#28282e" stroke="#ffffff" stroke-width="2.5"/>
    <rect x="400" y="428" width="45" height="6" rx="2" fill="#ffffff" opacity="0.6"/>
    <!-- Transitions -->
    <line x1="440" y1="200" x2="440" y2="275" stroke="#f5f5f5" stroke-width="2"/>
    <polygon points="434,271 440,281 446,271" fill="#f5f5f5"/>
    <line x1="440" y1="330" x2="440" y2="405" stroke="#f5f5f5" stroke-width="2"/>
    <polygon points="434,401 440,411 446,401" fill="#f5f5f5"/>
    <!-- Side node (enemy AI) -->
    <rect x="580" y="225" width="130" height="50" rx="10" fill="#28282e" stroke="#ffffff" stroke-width="2"/>
    <rect x="600" y="243" width="55" height="6" rx="2" fill="#ffffff" opacity="0.5"/>
    <line x1="500" y1="175" x2="580" y2="240" stroke="#f5f5f5" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <line x1="500" y1="305" x2="580" y2="260" stroke="#f5f5f5" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  
</g>
</svg>