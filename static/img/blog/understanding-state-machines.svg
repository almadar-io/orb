<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .light-variant { display: block; }
      .dark-variant { display: none; }
      @media (prefers-color-scheme: dark) {
        .light-variant { display: none; }
        .dark-variant { display: block; }
      }
    </style>
  </defs>
  <g class="light-variant">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
    <!-- State: Idle -->
    <rect x="80" y="250" width="140" height="60" rx="12" fill="#f5f5f5" stroke="#000000" stroke-width="3"/>
    <rect x="105" y="270" width="50" height="7" rx="3" fill="#000000" opacity="0.7"/>
    <rect x="105" y="283" width="80" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <!-- Entry arrow -->
    <line x1="30" y1="280" x2="75" y2="280" stroke="#000000" stroke-width="2.5"/>
    <polygon points="72,274 82,280 72,286" fill="#000000"/>
    <!-- Transition: Idle -> Active -->
    <path d="M220 260 Q 310 180 380 220" fill="none" stroke="#000000" stroke-width="2"/>
    <polygon points="376,215 385,222 375,226" fill="#000000"/>
    <rect x="270" y="190" width="50" height="6" rx="2" fill="#000000" opacity="0.6"/>
    <!-- State: Active -->
    <rect x="330" y="210" width="140" height="60" rx="12" fill="#f5f5f5" stroke="#000000" stroke-width="3" filter="url(#glow)"/>
    <rect x="355" y="230" width="60" height="7" rx="3" fill="#000000" opacity="0.7"/>
    <rect x="355" y="243" width="85" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <!-- Transition: Active -> Complete -->
    <path d="M470 250 Q 550 200 590 250" fill="none" stroke="#000000" stroke-width="2"/>
    <polygon points="586,245 595,252 586,256" fill="#000000"/>
    <rect x="510" y="210" width="50" height="6" rx="2" fill="#000000" opacity="0.6"/>
    <!-- State: Complete -->
    <rect x="580" y="250" width="140" height="60" rx="12" fill="#f5f5f5" stroke="#000000" stroke-width="3"/>
    <rect x="605" y="270" width="70" height="7" rx="3" fill="#000000" opacity="0.7"/>
    <rect x="605" y="283" width="50" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <!-- Terminal double-border -->
    <rect x="576" y="246" width="148" height="68" rx="15" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.4"/>
    <!-- Reset: Complete -> Idle -->
    <path d="M580 305 Q 400 420 220 305" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"/>
    <polygon points="224,300 218,310 228,308" fill="#000000" opacity="0.4"/>
    <rect x="380" y="395" width="40" height="5" rx="2" fill="#000000" opacity="0.25"/>
  
</g>
  <g class="dark-variant">
