    <polygon points="376,215 385,222 375,226" fill="#f5f5f5"/>
    <rect x="270" y="190" width="50" height="6" rx="2" fill="#ffffff" opacity="0.6"/>
    <!-- State: Active -->
    <rect x="330" y="210" width="140" height="60" rx="12" fill="#28282e" stroke="#ffffff" stroke-width="3" filter="url(#glow)"/>
    <rect x="355" y="230" width="60" height="7" rx="3" fill="#ffffff" opacity="0.7"/>
    <rect x="355" y="243" width="85" height="5" rx="2" fill="#f5f5f5" opacity="0.3"/>
    <!-- Transition: Active -> Complete -->
    <path d="M470 250 Q 550 200 590 250" fill="none" stroke="#f5f5f5" stroke-width="2"/>
    <polygon points="586,245 595,252 586,256" fill="#f5f5f5"/>
    <rect x="510" y="210" width="50" height="6" rx="2" fill="#ffffff" opacity="0.6"/>
    <!-- State: Complete -->
    <rect x="580" y="250" width="140" height="60" rx="12" fill="#28282e" stroke="#ffffff" stroke-width="3"/>
    <rect x="605" y="270" width="70" height="7" rx="3" fill="#ffffff" opacity="0.7"/>
    <rect x="605" y="283" width="50" height="5" rx="2" fill="#f5f5f5" opacity="0.3"/>
    <!-- Terminal double-border -->
