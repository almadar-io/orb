    <!-- Reset: Complete -> Idle -->
    <path d="M580 305 Q 400 420 220 305" fill="none" stroke="#f5f5f5" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"/>
    <polygon points="224,300 218,310 228,308" fill="#f5f5f5" opacity="0.4"/>
    <rect x="380" y="395" width="40" height="5" rx="2" fill="#f5f5f5" opacity="0.25"/>
  
</g>
</svg>