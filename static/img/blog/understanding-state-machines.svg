        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#111117"/>
    <!-- State: Idle -->
    <rect x="80" y="250" width="140" height="60" rx="12" fill="#28282e" stroke="#ffffff" stroke-width="3"/>
