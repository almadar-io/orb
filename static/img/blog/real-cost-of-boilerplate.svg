    <rect x="80" y="330" width="240" height="40" rx="6" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" opacity="0.6"/>
    <rect x="95" y="342" width="60" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <rect x="80" y="380" width="240" height="40" rx="6" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" opacity="0.65"/>
