    <rect x="80" y="430" width="240" height="40" rx="6" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" opacity="0.7"/>
    <rect x="95" y="442" width="60" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <!-- VS divider -->
    <line x1="400" y1="140" x2="400" y2="460" stroke="#000000" stroke-width="1" stroke-dasharray="8 6" opacity="0.3"/>
    <!-- RIGHT: Single clean schema -->
    <rect x="480" y="220" width="240" height="160" rx="10" fill="#f5f5f5" stroke="#000000" stroke-width="3" filter="url(#glow)"/>
    <rect x="500" y="245" width="60" height="7" rx="3" fill="#000000" opacity="0.8"/>
    <rect x="510" y="262" width="140" height="5" rx="2" fill="#000000" opacity="0.5"/>
    <rect x="510" y="275" width="100" height="5" rx="2" fill="#000000" opacity="0.4"/>
