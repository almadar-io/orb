    <rect x="510" y="312" width="120" height="5" rx="2" fill="#000000" opacity="0.5"/>
    <rect x="510" y="325" width="80" height="5" rx="2" fill="#000000" opacity="0.4"/>
    <rect x="510" y="338" width="130" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <!-- Accent marker -->
    <circle cx="600" cy="420" r="10" fill="#000000" filter="url(#soft-glow)"/>
  
</g>
