        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
    <!-- Small machine A (top-left) -->
    <g transform="translate(120, 140)">
      <rect x="0" y="0" width="180" height="100" rx="8" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
      <circle cx="40" cy="50" r="16" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
      <circle cx="100" cy="50" r="16" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
      <circle cx="145" cy="50" r="16" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
      <line x1="56" y1="50" x2="84" y2="50" stroke="#000000" stroke-width="1.5"/>
      <line x1="116" y1="50" x2="129" y2="50" stroke="#000000" stroke-width="1.5"/>
    </g>
    <!-- Small machine B (top-right) -->
    <g transform="translate(120, 320)">
      <rect x="0" y="0" width="180" height="100" rx="8" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
      <circle cx="40" cy="50" r="16" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
      <circle cx="100" cy="50" r="16" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
      <line x1="56" y1="50" x2="84" y2="50" stroke="#000000" stroke-width="1.5"/>
    </g>
    <!-- Small machine C (mid) -->
    <g transform="translate(120, 500)">
      <rect x="0" y="-20" width="180" height="80" rx="8" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
      <circle cx="50" cy="20" r="14" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
      <circle cx="130" cy="20" r="14" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
      <line x1="64" y1="20" x2="116" y2="20" stroke="#000000" stroke-width="1.5"/>
    </g>
    <!-- Arrows from small machines to composed -->
    <path d="M300 190 C 380 190, 400 240, 450 260" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="6 3"/>
    <polygon points="446,254 456,260 446,266" fill="#000000"/>
    <path d="M300 370 C 380 370, 400 330, 450 310" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="6 3"/>
    <polygon points="446,304 456,310 446,316" fill="#000000"/>
    <path d="M300 500 C 380 480, 420 400, 450 360" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="6 3"/>
    <polygon points="446,354 456,360 446,366" fill="#000000"/>
    <!-- Large composed machine (right) -->
    <rect x="460" y="140" width="260" height="340" rx="12" fill="#f5f5f5" stroke="#000000" stroke-width="3" filter="url(#glow)"/>
    <!-- Nodes inside composed machine -->
    <circle cx="530" cy="210" r="20" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <circle cx="650" cy="210" r="20" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <circle cx="530" cy="310" r="20" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <circle cx="650" cy="310" r="20" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <circle cx="590" cy="400" r="20" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <!-- Inner connections -->
    <line x1="550" y1="210" x2="630" y2="210" stroke="#000000" stroke-width="1.5"/>
    <line x1="530" y1="230" x2="530" y2="290" stroke="#000000" stroke-width="1.5"/>
    <line x1="650" y1="230" x2="650" y2="290" stroke="#000000" stroke-width="1.5"/>
    <line x1="550" y1="310" x2="630" y2="310" stroke="#000000" stroke-width="1.5"/>
    <line x1="545" y1="325" x2="575" y2="385" stroke="#000000" stroke-width="1.5"/>
    <line x1="635" y1="325" x2="605" y2="385" stroke="#000000" stroke-width="1.5"/>
  
</g>
