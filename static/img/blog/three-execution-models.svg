<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
    <!-- Source .orb at top center -->
    <polygon points="400,60 440,85 440,135 400,160 360,135 360,85" fill="#f5f5f5" stroke="#000000" stroke-width="3" filter="url(#glow)"/>
    <circle cx="400" cy="110" r="12" fill="#000000"/>
    <!-- Three branching lines down -->
    <line x1="370" y1="155" x2="180" y2="240" stroke="#000000" stroke-width="2"/>
    <line x1="400" y1="160" x2="400" y2="240" stroke="#000000" stroke-width="2"/>
    <line x1="430" y1="155" x2="620" y2="240" stroke="#000000" stroke-width="2"/>
    <!-- Path 1: Interpreted (left) -->
    <rect x="100" y="250" width="160" height="240" rx="10" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="120" y="270" width="60" height="8" rx="3" fill="#000000" opacity="0.7"/>
    <!-- Browser-like content -->
    <rect x="115" y="295" width="130" height="80" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1"/>
    <rect x="125" y="310" width="50" height="5" rx="2" fill="#000000" opacity="0.4"/>
    <rect x="125" y="322" width="80" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <rect x="125" y="334" width="60" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <rect x="125" y="346" width="90" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <circle cx="180" cy="430" r="18" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <path d="M172 430 L188 430 M180 422 L180 438" stroke="#000000" stroke-width="2"/>

    <!-- Path 2: Compiled (center) -->
    <rect x="320" y="250" width="160" height="240" rx="10" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="340" y="270" width="60" height="8" rx="3" fill="#000000" opacity="0.7"/>
    <!-- Binary-like content -->
    <rect x="335" y="295" width="130" height="80" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1"/>
    <rect x="345" y="310" width="40" height="5" rx="2" fill="#000000" opacity="0.5"/>
    <rect x="345" y="322" width="70" height="5" rx="2" fill="#000000" opacity="0.4"/>
    <rect x="345" y="334" width="55" height="5" rx="2" fill="#000000" opacity="0.4"/>
    <rect x="345" y="346" width="80" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <rect x="370" y="420" width="60" height="25" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <rect x="380" y="428" width="40" height="4" rx="1" fill="#000000" opacity="0.6"/>

    <!-- Path 3: Server (right) -->
    <rect x="540" y="250" width="160" height="240" rx="10" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="560" y="270" width="60" height="8" rx="3" fill="#000000" opacity="0.7"/>
    <!-- Server rack -->
    <rect x="555" y="295" width="130" height="80" rx="6" fill="#ffffff" stroke="#000000" stroke-width="1"/>
    <rect x="565" y="305" width="110" height="15" rx="3" fill="#f5f5f5" stroke="#000000" stroke-width="1"/>
    <rect x="565" y="325" width="110" height="15" rx="3" fill="#f5f5f5" stroke="#000000" stroke-width="1"/>
    <rect x="565" y="345" width="110" height="15" rx="3" fill="#f5f5f5" stroke="#000000" stroke-width="1"/>
    <circle cx="575" cy="312" r="3" fill="#000000"/>
    <circle cx="575" cy="332" r="3" fill="#000000"/>
    <circle cx="575" cy="352" r="3" fill="#000000"/>
    <circle cx="620" cy="440" r="18" fill="#f5f5f5" stroke="#000000" stroke-width="2"/>
    <rect x="612" y="435" width="16" height="10" rx="2" fill="#000000" opacity="0.5"/>
  
</svg>