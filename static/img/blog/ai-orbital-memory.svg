<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .light-variant { display: block; }
      .dark-variant { display: none; }
      @media (prefers-color-scheme: dark) {
        .light-variant { display: none; }
        .dark-variant { display: block; }
      }
    </style>
  </defs>
  <g class="light-variant">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
    <!-- Outer memory ring -->
    <circle cx="400" cy="300" r="180" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="12 6" opacity="0.5"/>
    <circle cx="400" cy="300" r="160" fill="none" stroke="#000000" stroke-width="1.5" opacity="0.3"/>
    <!-- Memory segments on ring -->
    <rect x="395" y="110" width="40" height="22" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" transform="rotate(-20 400 300)"/>
    <rect x="395" y="110" width="40" height="22" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" transform="rotate(25 400 300)"/>
    <rect x="395" y="110" width="40" height="22" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" transform="rotate(70 400 300)"/>
    <rect x="395" y="110" width="40" height="22" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" transform="rotate(115 400 300)"/>
    <rect x="395" y="110" width="40" height="22" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" transform="rotate(160 400 300)"/>
    <rect x="395" y="110" width="40" height="22" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" transform="rotate(205 400 300)"/>
    <rect x="395" y="110" width="40" height="22" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" transform="rotate(250 400 300)"/>
    <rect x="395" y="110" width="40" height="22" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" transform="rotate(295 400 300)"/>
    <!-- Central orbital unit -->
    <polygon points="400,240 460,270 460,330 400,360 340,330 340,270" fill="#f5f5f5" stroke="#000000" stroke-width="3"/>
    <circle cx="400" cy="300" r="25" fill="#f5f5f5" stroke="#000000" stroke-width="2" filter="url(#glow)"/>
    <circle cx="400" cy="300" r="8" fill="#000000"/>
    <!-- Connection spokes to memory ring -->
    <line x1="400" y1="240" x2="400" y2="145" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <line x1="460" y1="270" x2="540" y2="180" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <line x1="460" y1="330" x2="540" y2="420" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <line x1="340" y1="270" x2="260" y2="180" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <line x1="340" y1="330" x2="260" y2="420" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  
</g>
  <g class="dark-variant">
