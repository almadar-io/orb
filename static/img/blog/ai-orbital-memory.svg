    <rect x="395" y="110" width="40" height="22" rx="4" fill="#28282e" stroke="#ffffff" stroke-width="1.5" transform="rotate(70 400 300)"/>
    <rect x="395" y="110" width="40" height="22" rx="4" fill="#28282e" stroke="#ffffff" stroke-width="1.5" transform="rotate(115 400 300)"/>
