    <line x1="460" y1="330" x2="540" y2="420" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <line x1="340" y1="270" x2="260" y2="180" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <line x1="340" y1="330" x2="260" y2="420" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  
</g>
</svg>