<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
    <!-- State A -->
    <rect x="80" y="260" width="120" height="50" rx="10" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="95" y="278" width="50" height="7" rx="2" fill="#000000" opacity="0.6"/>
    <!-- Arrow to Guard 1 -->
    <line x1="200" y1="285" x2="270" y2="285" stroke="#000000" stroke-width="2"/>
    <polygon points="266,279 276,285 266,291" fill="#000000"/>
    <!-- Guard 1 (diamond) -->
    <polygon points="310,255 340,285 310,315 280,285" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <!-- Pass path -->
    <line x1="340" y1="285" x2="410" y2="285" stroke="#000000" stroke-width="2"/>
    <polygon points="406,279 416,285 406,291" fill="#000000"/>
    <!-- State B -->
    <rect x="420" y="260" width="120" height="50" rx="10" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="435" y="278" width="55" height="7" rx="2" fill="#000000" opacity="0.6"/>
    <!-- Arrow to Guard 2 -->
    <line x1="540" y1="285" x2="610" y2="285" stroke="#000000" stroke-width="2"/>
    <polygon points="606,279 616,285 606,291" fill="#000000"/>
    <!-- Guard 2 (diamond) -->
    <polygon points="650,255 680,285 650,315 620,285" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <!-- Block path (X) -->
    <line x1="640" y1="275" x2="660" y2="295" stroke="#000000" stroke-width="2.5"/>
    <line x1="660" y1="275" x2="640" y2="295" stroke="#000000" stroke-width="2.5"/>
    <!-- Rejected arrow going down -->
    <line x1="650" y1="315" x2="650" y2="380" stroke="#000000" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.5"/>
    <polygon points="644,375 650,385 656,375" fill="#000000" opacity="0.5"/>
    <!-- Rejected state -->
    <rect x="600" y="390" width="100" height="40" rx="8" fill="#f5f5f5" stroke="#000000" stroke-width="1.5" opacity="0.5"/>
    <rect x="615" y="404" width="40" height="6" rx="2" fill="#000000" opacity="0.4"/>
    <!-- Guard 1 check mark -->
    <path d="M302 285 L308 292 L320 278" fill="none" stroke="#000000" stroke-width="2.5"/>
    <!-- Top guard explanation row -->
    <rect x="260" y="195" width="60" height="20" rx="4" fill="#000000" opacity="0.15" stroke="#000000" stroke-width="1"/>
    <rect x="600" y="195" width="60" height="20" rx="4" fill="#000000" opacity="0.15" stroke="#000000" stroke-width="1"/>
  
</svg>