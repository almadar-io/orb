<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .light-variant { display: block; }
      .dark-variant { display: none; }
      @media (prefers-color-scheme: dark) {
        .light-variant { display: none; }
        .dark-variant { display: block; }
      }
    </style>
  </defs>
  <g class="light-variant">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
    <!-- Central Entity -->
    <rect x="300" y="230" width="200" height="100" rx="6" fill="#f5f5f5" stroke="#000000" stroke-width="4" filter="url(#glow)"/>
    <rect x="320" y="252" width="80" height="8" rx="3" fill="#000000" opacity="0.8"/>
    <rect x="320" y="268" width="140" height="6" rx="2" fill="#000000" opacity="0.4"/>
    <rect x="320" y="282" width="100" height="6" rx="2" fill="#000000" opacity="0.4"/>
    <rect x="320" y="296" width="120" height="6" rx="2" fill="#000000" opacity="0.4"/>
    <!-- Connection lines to traits -->
    <line x1="300" y1="260" x2="160" y2="160" stroke="#000000" stroke-width="2" stroke-dasharray="5 3" opacity="0.5"/>
    <line x1="400" y1="230" x2="400" y2="130" stroke="#000000" stroke-width="2" stroke-dasharray="5 3" opacity="0.5"/>
    <line x1="500" y1="260" x2="640" y2="160" stroke="#000000" stroke-width="2" stroke-dasharray="5 3" opacity="0.5"/>
    <line x1="300" y1="310" x2="160" y2="420" stroke="#000000" stroke-width="2" stroke-dasharray="5 3" opacity="0.5"/>
    <line x1="500" y1="310" x2="640" y2="420" stroke="#000000" stroke-width="2" stroke-dasharray="5 3" opacity="0.5"/>
    <!-- Trait 1 (top-left) -->
    <rect x="60" y="120" width="140" height="55" rx="20" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="85" y="140" width="60" height="7" rx="3" fill="#000000" opacity="0.7"/>
    <rect x="85" y="153" width="90" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <!-- Trait 2 (top-center) -->
    <rect x="330" y="80" width="140" height="55" rx="20" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="355" y="100" width="70" height="7" rx="3" fill="#000000" opacity="0.7"/>
    <rect x="355" y="113" width="80" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <!-- Trait 3 (top-right) -->
    <rect x="600" y="120" width="140" height="55" rx="20" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="625" y="140" width="55" height="7" rx="3" fill="#000000" opacity="0.7"/>
    <rect x="625" y="153" width="85" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <!-- Trait 4 (bottom-left) -->
    <rect x="60" y="400" width="140" height="55" rx="20" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="85" y="420" width="65" height="7" rx="3" fill="#000000" opacity="0.7"/>
    <rect x="85" y="433" width="80" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <!-- Trait 5 (bottom-right) -->
    <rect x="600" y="400" width="140" height="55" rx="20" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="625" y="420" width="75" height="7" rx="3" fill="#000000" opacity="0.7"/>
    <rect x="625" y="433" width="90" height="5" rx="2" fill="#000000" opacity="0.3"/>
  
</g>
  <g class="dark-variant">
