<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .light-variant { display: block; }
      .dark-variant { display: none; }
      @media (prefers-color-scheme: dark) {
        .light-variant { display: none; }
        .dark-variant { display: block; }
      }
    </style>
  </defs>
  <g class="light-variant">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
    <!-- State 1: Idle -->
    <rect x="100" y="250" width="140" height="60" rx="12" fill="#f5f5f5" stroke="#000000" stroke-width="3"/>
    <rect x="120" y="268" width="50" height="8" rx="3" fill="#000000" opacity="0.7"/>
    <!-- State 2: Active -->
    <rect x="330" y="130" width="140" height="60" rx="12" fill="#f5f5f5" stroke="#000000" stroke-width="3" filter="url(#glow)"/>
    <rect x="350" y="148" width="60" height="8" rx="3" fill="#000000" opacity="0.7"/>
    <!-- State 3: Complete -->
    <rect x="560" y="250" width="140" height="60" rx="12" fill="#f5f5f5" stroke="#000000" stroke-width="3"/>
    <rect x="580" y="268" width="70" height="8" rx="3" fill="#000000" opacity="0.7"/>
    <!-- Transition: Idle -> Active -->
    <path d="M240 255 Q 300 180, 330 160" fill="none" stroke="#000000" stroke-width="2"/>
    <polygon points="326,165 335,158 330,168" fill="#000000"/>
    <!-- Transition: Active -> Complete -->
    <path d="M470 185 Q 540 230, 560 260" fill="none" stroke="#000000" stroke-width="2"/>
    <polygon points="555,255 565,258 558,266" fill="#000000"/>
    <!-- Transition: Complete -> Idle (reset) -->
    <path d="M560 305 Q 400 420, 240 305" fill="none" stroke="#000000" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
    <polygon points="245,300 238,310 248,308" fill="#000000" opacity="0.5"/>
    <!-- Transition label bars -->
    <rect x="260" y="200" width="40" height="6" rx="2" fill="#000000" opacity="0.5"/>
    <rect x="500" y="215" width="40" height="6" rx="2" fill="#000000" opacity="0.5"/>
    <rect x="380" y="395" width="40" height="6" rx="2" fill="#000000" opacity="0.3"/>
    <!-- Entry indicator on first state -->
    <line x1="60" y1="280" x2="95" y2="280" stroke="#000000" stroke-width="2.5"/>
    <polygon points="92,274 102,280 92,286" fill="#000000"/>
  
</g>
  <g class="dark-variant">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#111117"/>
    <!-- State 1: Idle -->
    <rect x="100" y="250" width="140" height="60" rx="12" fill="#28282e" stroke="#ffffff" stroke-width="3"/>
    <rect x="120" y="268" width="50" height="8" rx="3" fill="#ffffff" opacity="0.7"/>
    <!-- State 2: Active -->
    <rect x="330" y="130" width="140" height="60" rx="12" fill="#28282e" stroke="#ffffff" stroke-width="3" filter="url(#glow)"/>
    <rect x="350" y="148" width="60" height="8" rx="3" fill="#ffffff" opacity="0.7"/>
    <!-- State 3: Complete -->
    <rect x="560" y="250" width="140" height="60" rx="12" fill="#28282e" stroke="#ffffff" stroke-width="3"/>
    <rect x="580" y="268" width="70" height="8" rx="3" fill="#ffffff" opacity="0.7"/>
    <!-- Transition: Idle -> Active -->
    <path d="M240 255 Q 300 180, 330 160" fill="none" stroke="#f5f5f5" stroke-width="2"/>
    <polygon points="326,165 335,158 330,168" fill="#f5f5f5"/>
    <!-- Transition: Active -> Complete -->
    <path d="M470 185 Q 540 230, 560 260" fill="none" stroke="#f5f5f5" stroke-width="2"/>
    <polygon points="555,255 565,258 558,266" fill="#f5f5f5"/>
    <!-- Transition: Complete -> Idle (reset) -->
    <path d="M560 305 Q 400 420, 240 305" fill="none" stroke="#f5f5f5" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
    <polygon points="245,300 238,310 248,308" fill="#f5f5f5" opacity="0.5"/>
    <!-- Transition label bars -->
    <rect x="260" y="200" width="40" height="6" rx="2" fill="#ffffff" opacity="0.5"/>
    <rect x="500" y="215" width="40" height="6" rx="2" fill="#ffffff" opacity="0.5"/>
    <rect x="380" y="395" width="40" height="6" rx="2" fill="#ffffff" opacity="0.3"/>
    <!-- Entry indicator on first state -->
    <line x1="60" y1="280" x2="95" y2="280" stroke="#ffffff" stroke-width="2.5"/>
    <polygon points="92,274 102,280 92,286" fill="#ffffff"/>
  
</g>
</svg>