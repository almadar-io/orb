<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .light-variant { display: block; }
      .dark-variant { display: none; }
      @media (prefers-color-scheme: dark) {
        .light-variant { display: none; }
        .dark-variant { display: block; }
      }
    </style>
  </defs>
  <g class="light-variant">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
    <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
    <!-- Incoming arrow (bad code) -->
    <rect x="80" y="255" width="160" height="60" rx="8" fill="#f5f5f5" stroke="#000000" stroke-width="2" opacity="0.6"/>
    <rect x="100" y="273" width="40" height="5" rx="2" fill="#000000" opacity="0.4"/>
    <rect x="100" y="283" width="70" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <rect x="100" y="293" width="55" height="5" rx="2" fill="#000000" opacity="0.3"/>
    <line x1="240" y1="285" x2="330" y2="285" stroke="#000000" stroke-width="2.5"/>
    <polygon points="326,278 338,285 326,292" fill="#000000"/>
    <!-- Shield / stop sign (octagon) -->
    <polygon points="400,220 440,235 455,270 455,310 440,345 400,360 360,345 345,310 345,270 360,235" fill="#f5f5f5" stroke="#000000" stroke-width="4" filter="url(#glow)"/>
    <!-- X inside shield -->
    <line x1="380" y1="268" x2="420" y2="308" stroke="#000000" stroke-width="3.5"/>
    <line x1="420" y1="268" x2="380" y2="308" stroke="#000000" stroke-width="3.5"/>
    <!-- Outgoing arrow (validated) -->
    <line x1="455" y1="285" x2="540" y2="285" stroke="#000000" stroke-width="2.5"/>
    <polygon points="536,278 548,285 536,292" fill="#000000"/>
    <!-- Valid output -->
    <rect x="555" y="255" width="160" height="60" rx="8" fill="#f5f5f5" stroke="#000000" stroke-width="2.5"/>
    <rect x="575" y="273" width="50" height="5" rx="2" fill="#000000" opacity="0.6"/>
    <rect x="575" y="283" width="80" height="5" rx="2" fill="#000000" opacity="0.5"/>
    <rect x="575" y="293" width="60" height="5" rx="2" fill="#000000" opacity="0.4"/>
    <!-- Checkmark beside output -->
    <path d="M725 270 L735 282 L755 258" fill="none" stroke="#000000" stroke-width="3.5"/>
    <!-- Rejected items falling below shield -->
    <rect x="370" y="390" width="60" height="30" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="1" opacity="0.3" transform="rotate(-10 400 405)"/>
    <rect x="385" y="430" width="50" height="25" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="1" opacity="0.25" transform="rotate(8 410 442)"/>
    <line x1="400" y1="360" x2="395" y2="385" stroke="#000000" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
  
</g>
