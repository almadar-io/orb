<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="100%" height="100%">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  
    <rect x="250" y="60" width="300" height="240" rx="20" fill="#f5f5f5" stroke="#000000" stroke-width="4" opacity="0.9"/>
    <!-- Entity Center -->
    <rect x="350" y="130" width="100" height="100" rx="10" fill="none" stroke="#000000" stroke-width="6" filter="url(#glow)"/>
    <line x1="360" y1="160" x2="440" y2="160" stroke="#000000" stroke-width="4"/>
    <line x1="360" y1="180" x2="440" y2="180" stroke="#000000" stroke-width="4"/>
    <line x1="360" y1="200" x2="420" y2="200" stroke="#000000" stroke-width="4"/>
    
    <!-- Left Trait -->
    <circle cx="300" cy="180" r="25" fill="#f5f5f5" stroke="#000000" stroke-width="4"/>
    <line x1="325" y1="180" x2="350" y2="180" stroke="#000000" stroke-width="4"/>
    
    <!-- Right Page -->
    <rect x="470" y="160" width="40" height="40" rx="4" fill="#f5f5f5" stroke="#000000" stroke-width="4"/>
    <line x1="450" y1="180" x2="470" y2="180" stroke="#000000" stroke-width="4"/>
  
</svg>