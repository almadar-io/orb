<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
      <rect width="600" height="600" fill="#ffffff" />
      <defs>
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="6" result="blur" />
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="16" result="blur" />
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
      <g font-family="sans-serif">
      <path d="M 100 400 L 100 200 L 500 200 L 500 400" fill="none" stroke="#000000" stroke-width="16" stroke-linejoin="miter" />
      <rect x="280" y="180" width="40" height="40" fill="#ca8a04" />
      <circle cx="100" cy="400" r="18" fill="#000000" />
      <circle cx="500" cy="400" r="18" fill="#000000" />
    </g>
    </svg>