name: Publish to npm

# Triggered by kflow.ai's build-almadar-cli workflow after syncing binaries.
# Publishes @almadar/orb (wrapper) + @almadar/orb-{platform} (binary) packages.

on:
  repository_dispatch:
    types: [orb-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., v5.3.0)"
        required: true
        type: string

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.event.client_payload.version }}"
          fi
          # Strip leading 'v' for npm version
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION#v}"

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ROOT_DIR="$(pwd)"

          declare -A PLATFORMS=(
            ["linux-x64"]="linux x64"
            ["linux-arm64"]="linux arm64"
            ["darwin-x64"]="darwin x64"
            ["darwin-arm64"]="darwin arm64"
            ["windows-x64"]="win32 x64"
          )

          for platform in "${!PLATFORMS[@]}"; do
            read os cpu <<< "${PLATFORMS[$platform]}"

            DIST_DIR="cli/dist/${platform}"
            if [ ! -d "$DIST_DIR" ]; then
              echo "Skipping $platform — no binaries at $DIST_DIR"
              continue
            fi

            PKG_DIR="${ROOT_DIR}/npm-packages/@almadar/orb-${platform}"
            mkdir -p "$PKG_DIR"

            # Copy the binary
            if [ "$platform" = "windows-x64" ]; then
              cp "$DIST_DIR/orb.exe" "$PKG_DIR/" 2>/dev/null || true
            else
              cp "$DIST_DIR/orb" "$PKG_DIR/" 2>/dev/null || true
              chmod +x "$PKG_DIR/orb" 2>/dev/null || true
            fi

            cat > "$PKG_DIR/package.json" << EOF
          {
            "name": "@almadar/orb-${platform}",
            "version": "${VERSION}",
            "description": "Orb CLI binary for ${platform}",
            "license": "BSL-1.1",
            "repository": { "type": "git", "url": "https://github.com/almadar-io/orb.git" },
            "os": ["${os}"],
            "cpu": ["${cpu}"]
          }
          EOF

            echo "Publishing @almadar/orb-${platform}@${VERSION}..."
            cd "$PKG_DIR"
            npm publish --access public || echo "Failed to publish @almadar/orb-${platform}"
            cd "$ROOT_DIR"
          done

      - name: Publish main wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ROOT_DIR="$(pwd)"

          # Source of truth: cli/npm/ in this repo
          if [ ! -d "cli/npm" ]; then
            echo "ERROR: cli/npm not found"
            exit 1
          fi

          PKG_DIR="${ROOT_DIR}/npm-packages/@almadar/orb"
          mkdir -p "$PKG_DIR"
          cp -r cli/npm/* "$PKG_DIR/"

          # Copy shell templates if available
          if [ -d "cli/shells" ]; then
            echo "Copying shell templates..."
            mkdir -p "$PKG_DIR/shells"
            for shell_dir in cli/shells/*/; do
              [ -d "$shell_dir" ] || continue
              shell_name=$(basename "$shell_dir")
              echo "  Copying $shell_name..."
              mkdir -p "$PKG_DIR/shells/$shell_name"
              rsync -a --exclude='node_modules' --exclude='.git' --exclude='generated' --exclude='dist' \
                "$shell_dir" "$PKG_DIR/shells/$shell_name/"
            done
          fi

          cd "$PKG_DIR"
          # Stamp version + align optionalDependencies versions
          jq --arg v "$VERSION" '.version = $v | .optionalDependencies |= with_entries(.value = $v)' package.json > tmp.json && mv tmp.json package.json
          echo "Publishing @almadar/orb@${VERSION}..."
          npm publish --access public || echo "Failed to publish @almadar/orb"

  update-homebrew:
    name: Update Homebrew Tap
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ vars.PUBLISH_HOMEBREW == 'true' }}
    steps:
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Download and compute SHA256
        id: sha
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BASE_URL="https://github.com/almadar-io/orb/releases/download/${VERSION}"

          for platform in darwin-x64 darwin-arm64 linux-x64 linux-arm64; do
            if curl -fsSL "${BASE_URL}/orb-${platform}.tar.gz" -o "orb-${platform}.tar.gz" 2>/dev/null; then
              SHA=$(sha256sum "orb-${platform}.tar.gz" | cut -d' ' -f1)
              echo "${platform}=${SHA}" >> $GITHUB_OUTPUT
            else
              echo "${platform}=MISSING" >> $GITHUB_OUTPUT
            fi
          done

      - name: Update Homebrew formula
        run: |
          VERSION=${{ steps.version.outputs.version }}
          VERSION_NUM=${VERSION#v}

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/almadar-io/homebrew-tap.git tap || exit 0

          cat > tap/Formula/orb.rb << EOF
          class Orb < Formula
            desc "Compile Orbital schemas to full-stack applications"
            homepage "https://orb.almadar.io"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              on_intel do
                url "https://github.com/almadar-io/orb/releases/download/${VERSION}/orb-darwin-x64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin-x64 }}"
              end
              on_arm do
                url "https://github.com/almadar-io/orb/releases/download/${VERSION}/orb-darwin-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.darwin-arm64 }}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/almadar-io/orb/releases/download/${VERSION}/orb-linux-x64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux-x64 }}"
              end
              on_arm do
                url "https://github.com/almadar-io/orb/releases/download/${VERSION}/orb-linux-arm64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux-arm64 }}"
              end
            end

            def install
              bin.install "orb"
              # Install shell templates
              (lib/"orb/shells").install Dir["shells/*"] if Dir.exist?("shells")
            end

            test do
              assert_match "orb", shell_output("#{bin}/orb --help")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/orb.rb
          git diff --staged --quiet || git commit -m "Update orb to ${VERSION}"
          git push || echo "Could not push"
