name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [orb-release]

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Cache Docusaurus build artifacts: webpack5's filesystem cache
      # (node_modules/.cache/webpack) and Docusaurus's plugin output
      # (.docusaurus). On a warm hit webpack reuses ~95% of compiled
      # modules, dropping a 25-min build to ~8-10 min.
      - name: Cache Docusaurus build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .docusaurus
            node_modules/.cache
          key: docusaurus-${{ runner.os }}-${{ hashFiles('package-lock.json', 'docusaurus.config.ts', 'shared/**', 'docs/**', 'blog/**', 'src/**', 'static/**') }}
          restore-keys: |
            docusaurus-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx docusaurus build
        env:
          NODE_ENV: production

      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-sa.json

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting:orb --project kflow-b3a39
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/firebase-sa.json
